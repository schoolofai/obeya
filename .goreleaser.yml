version: 2

project_name: obeya

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test ./... -timeout 120s

builds:
  - main: .
    binary: ob
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

nfpms:
  - id: obeya
    package_name: obeya
    vendor: schoolofai
    homepage: "https://github.com/schoolofai/obeya"
    maintainer: "schoolofai"
    description: "CLI Kanban board for humans and AI agents"
    license: "MIT"
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin

brews:
  - repository:
      owner: schoolofai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    name: obeya
    homepage: "https://github.com/schoolofai/obeya"
    description: "CLI Kanban board for humans and AI agents"
    license: "MIT"
    install: |
      bin.install "ob"
    test: |
      system "#{bin}/ob", "--help"

scoops:
  - repository:
      owner: schoolofai
      name: scoop-obeya
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    homepage: "https://github.com/schoolofai/obeya"
    description: "CLI Kanban board for humans and AI agents"
    license: "MIT"
